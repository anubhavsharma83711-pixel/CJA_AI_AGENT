<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Chat Layout</title>
    <style>
        /* Global Reset & Base Rules */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden; /* Prevent body scrolling */
            background-color: #f0f2f5;
        }

        /* Main Container */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 1. Header (Fixed via Flex) */
        .chat-header {
            padding: 16px;
            background-color: #075e54;
            color: white;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .chat-header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        /* 2. Chat Messages Area (Scrollable) */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            background-color: #e5ddd5;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Message Styling (Critical) */
        .message {
            max-width: 80%; /* Limit message width */
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            
            /* Overflow handling */
            max-width: 100%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
            
            position: relative;
        }

        .message.sent {
            background-color: #dcf8c6;
            align-self: flex-end;
            border-top-right-radius: 0;
        }

        .message.received {
            background-color: white;
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        /* 3. Input Area (Fixed via Flex) */
        .chat-input-area {
            padding: 12px;
            background-color: #f0f0f0;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
            display: flex;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .chat-input-area button {
            background-color: #075e54;
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Scrollbar Styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <header class="chat-header">
        <h1>Guru Assistant</h1>
    </header>

    <main class="chat-messages" id="chat-messages">
        <div class="message received">Hello! How can I help you today?</div>
        <div class="message received">Try sending a long message to see how it wraps.</div>
    </main>

    <footer class="chat-input-area">
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </footer>
</div>

<script>
    const container = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function isNearBottom() {
        // Check if user is within 100px of bottom
        return container.scrollHeight - container.scrollTop - container.clientHeight < 100;
    }

    function scrollToBottom() {
        container.scrollTop = container.scrollHeight;
    }

    function addMessage(text, type) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        messageDiv.textContent = text;
        
        const shouldScroll = isNearBottom();
        
        container.appendChild(messageDiv);
        
        if (shouldScroll) {
            scrollToBottom();
        }
    }

    function handleSend() {
        const text = userInput.value.trim();
        if (text) {
            addMessage(text, 'sent');
            userInput.value = '';
            
            // Mock response
            setTimeout(() => {
                addMessage("I've received your message. I'm processing the data now...", 'received');
            }, 1000);
        }
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSend();
    });

    // Initial scroll
    scrollToBottom();
</script>

</body>
</html>
